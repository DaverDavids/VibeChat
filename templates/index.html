<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sonic Pi AI Control</title>
  <style>
    :root {
      --bg: #111418;
      --panel: #1a1f26;
      --panel2: #222833;
      --text: #e8edf2;
      --muted: #95a2b3;
      --ok: #42c47c;
      --bad: #e06060;
      --accent: #4f8cff;
      --border: #313947;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.45 system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    h1, h2, h3 { margin: 0 0 12px; }
    h1 { font-size: 24px; }
    h2 { font-size: 18px; }
    .grid {
      display: grid;
      gap: 12px;
    }
    .grid.two {
      grid-template-columns: repeat(2, minmax(0,1fr));
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
    }
    input, select, button, textarea {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel2);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    button {
      cursor: pointer;
      background: var(--accent);
      border: none;
      font-weight: 600;
    }
    button.secondary {
      background: #394252;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #2b3240;
      color: var(--muted);
      font-size: 12px;
    }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0d1015;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow: auto;
      max-height: 300px;
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 10px;
    }
    .status-item {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }
    .small { color: var(--muted); font-size: 12px; }
    .history-item {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 12px;
    }
    @media (max-width: 980px) {
      .wrap, .status-grid, .grid.two { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="card">
        <div class="row" style="justify-content:space-between">
          <div>
            <h1>Sonic Pi AI Control</h1>
            <div class="small">Model: {{ model }}</div>
          </div>
          <div class="badge" id="clock">...</div>
        </div>

        <div class="status-grid" style="margin-top:16px">
          <div class="status-item"><div class="small">Ollama</div><div id="st-ollama">...</div></div>
          <div class="status-item"><div class="small">Sonic Pi</div><div id="st-sonic">...</div></div>
          <div class="status-item"><div class="small">JACK</div><div id="st-jack">...</div></div>
          <div class="status-item"><div class="small">FFmpeg</div><div id="st-ffmpeg">...</div></div>
        </div>

        <div class="row" style="margin-top:16px">
          <button id="btn-refresh" class="secondary">Refresh</button>
          <button id="btn-test">Test Ping</button>
          <div class="small" id="last-sent">No code sent yet.</div>
        </div>
      </div>

      <div class="card">
        <h2>Generate music</h2>
        <label for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="lofi hip-hop with light percussion and warm bass"></textarea>
        <div class="row" style="margin-top:12px">
          <button id="btn-generate">Generate + Send</button>
          <div class="small" id="generate-status"></div>
        </div>
      </div>

      <div class="card">
        <h2>Live settings</h2>
        <div class="grid two">
          <div>
            <label for="bpm">BPM</label>
            <input id="bpm" type="number" value="{{ settings.bpm }}">
          </div>
          <div>
            <label for="cutoff">Cutoff</label>
            <input id="cutoff" type="number" value="{{ settings.cutoff }}">
          </div>
          <div>
            <label for="synth">Synth</label>
            <input id="synth" type="text" value="{{ settings.synth }}">
          </div>
          <div>
            <label for="sleep">Sleep</label>
            <input id="sleep" type="number" step="0.05" value="{{ settings.sleep }}">
          </div>
        </div>
        <div class="row" style="margin-top:12px">
          <button id="btn-settings">Send settings</button>
          <div class="small" id="settings-status"></div>
        </div>
      </div>

      <div class="card">
        <h2>Recent generations</h2>
        <div id="history"></div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Bridge log</h2>
        <pre id="bridge-log">loading...</pre>
      </div>

      <div class="card">
        <h2>Headless log</h2>
        <pre id="headless-log">loading...</pre>
      </div>
    </div>
  </div>

  <script>
    async function getJSON(url, opts={}) {
      const r = await fetch(url, opts);
      return await r.json();
    }

    function statusText(ok, good='OK', bad='DOWN') {
      return ok ? `<span class="ok">${good}</span>` : `<span class="bad">${bad}</span>`;
    }

    async function refreshStatus() {
      const s = await getJSON('/api/status');
      document.getElementById('clock').textContent = s.time;
      document.getElementById('st-ollama').innerHTML = statusText(s.ollama_up);
      document.getElementById('st-sonic').innerHTML = statusText(s.sonic_pi_process);
      document.getElementById('st-jack').innerHTML = statusText(s.jackd_process);
      document.getElementById('st-ffmpeg').innerHTML = statusText(s.ffmpeg_process);
      document.getElementById('last-sent').textContent =
        s.last_sent_at ? `Last send: ${s.last_sent_at}` : 'No code sent yet.';
    }

    async function refreshLogs() {
      const logs = await getJSON('/api/logs');
      document.getElementById('bridge-log').textContent = logs.bridge || '';
      document.getElementById('headless-log').textContent = logs.headless || '';
    }

    async function refreshHistory() {
      const items = await getJSON('/api/history');
      const el = document.getElementById('history');
      if (!items.length) {
        el.innerHTML = '<div class="small">No history yet.</div>';
        return;
      }
      el.innerHTML = items.map(item => `
        <div class="history-item">
          <div><strong>${item.time}</strong></div>
          <div class="small" style="margin:6px 0 10px">${item.prompt}</div>
          <pre>${item.code}</pre>
        </div>
      `).join('');
    }

    async function refreshAll() {
      await Promise.all([refreshStatus(), refreshLogs(), refreshHistory()]);
    }

    document.getElementById('btn-refresh').onclick = refreshAll;

    document.getElementById('btn-test').onclick = async () => {
      await getJSON('/api/test-ping', {method:'POST'});
      await refreshAll();
    };

    document.getElementById('btn-generate').onclick = async () => {
      const prompt = document.getElementById('prompt').value.trim();
      const status = document.getElementById('generate-status');
      if (!prompt) return;
      status.textContent = 'Generating...';
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt})
      });
      const data = await res.json();
      status.textContent = data.status === 'ok' ? 'Sent.' : `Error: ${data.message}`;
      await refreshAll();
    };

    document.getElementById('btn-settings').onclick = async () => {
      const status = document.getElementById('settings-status');
      status.textContent = 'Sending...';
      const body = {
        bpm: document.getElementById('bpm').value,
        cutoff: document.getElementById('cutoff').value,
        synth: document.getElementById('synth').value,
        sleep: document.getElementById('sleep').value
      };
      const res = await fetch('/api/settings', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const data = await res.json();
      status.textContent = data.status === 'ok' ? 'Updated.' : 'Failed.';
      await refreshAll();
    };

    refreshAll();
    setInterval(refreshAll, 4000);
  </script>
</body>
</html>
